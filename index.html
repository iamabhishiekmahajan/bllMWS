<body class="text-stone-900 font-sans antialiased selection:bg-stone-300">

  <div id="root" class="h-screen w-full flex flex-col overflow-hidden"></div>

  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc, setDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'minimalistic-rough-bill-gen';
    const firebaseConfig = {
      apiKey: "AIzaSyC4ha5NdXyCFOYW8QApcWohBo_6BS6wGRk",
      authDomain: "myroughbillapp.firebaseapp.com",
      projectId: "myroughbillapp",
      storageBucket: "myroughbillapp.firebasestorage.app",
      messagingSenderId: "683327665576",
      appId: "1:683327665576:web:ecb33e232260125397199d"
    };

    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.warn("Could not authenticate Firebase nodes.", e);
    }

    window.firebaseBridge = {
      db, auth, appId, connected: false,
      products: [], bills: [], customers: [], sales: [],
      doc, getDoc, setDoc, collection, addDoc, updateDoc, deleteDoc, getDocs
    };

    async function startSetup() {
      if (!db) return;
      try {
        if (auth) await signInAnonymously(auth);
      } catch (e) {
        console.warn("Auth process skipped.");
      }

      window.firebaseBridge.connected = true;

      // Realtime Products Synchronizer
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), (snapshot) => {
        const list = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data && data.name) {
            list.push({ id: doc.id, ...data });
          }
        });
        window.firebaseBridge.products = list;
        if (window.firebaseBridge.onProductsChange) window.firebaseBridge.onProductsChange(list);
      });

      // Realtime Bills Synchronizer
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'bills'), (snapshot) => {
        const list = [];
        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
        list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        window.firebaseBridge.bills = list;
        if (window.firebaseBridge.onBillsChange) window.firebaseBridge.onBillsChange(list);
      });

      // Realtime Customers Registry Sync
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), (snapshot) => {
        const list = [];
        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
        window.firebaseBridge.customers = list;
        if (window.firebaseBridge.onCustomersChange) window.firebaseBridge.onCustomersChange(list);
      });
    }

    window.firebaseBridge.saveBillToCloud = async (bill) => await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'bills'), { ...bill, timestamp: Date.now() });
    window.firebaseBridge.updateBillInCloud = async (id, bill) => await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bills', id), { ...bill, timestamp: Date.now() });
    
    window.firebaseBridge.addProductToCloud = async (prod) => {
      const list = window.firebaseBridge.products;
      const cleanName = prod.name.trim().toLowerCase().replace(/\s+/g, ' ');
      const cleanCategory = (prod.category || "General").trim().toLowerCase().replace(/\s+/g, ' ');
      
      const isDuplicate = list.some(p => 
        p && p.name && p.name.trim().toLowerCase().replace(/\s+/g, ' ') === cleanName && 
        (p.category || "General").trim().toLowerCase().replace(/\s+/g, ' ') === cleanCategory
      );
      if (isDuplicate) return;
      return await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { ...prod, timestamp: Date.now() });
    };

    window.firebaseBridge.deleteProductFromCloud = async (id) => await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));

    startSetup();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [currentTab, setCurrentTab] = useState("bill");
      const [customerName, setCustomerName] = useState("");
      const [customerCity, setCustomerCity] = useState("");
      const [billDate, setBillDate] = useState(new Date().toISOString().split('T')[0]);
      
      const [discountX, setDiscountX] = useState("0"); 
      const [qty, setQty] = useState("1");
      const [productSearch, setProductSearch] = useState("");
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [code, setCode] = useState("");
      const [price, setPrice] = useState("");
      const [less, setLess] = useState("");
      
      // Dynamic Staged Pool items in Tab 1
      const [addedItems, setAddedItems] = useState([]);
      // Bagged (Tallied checklist items) in Tab 2
      const [baggedItems, setBaggedItems] = useState([]);

      const [dbCustomers, setDbCustomers] = useState([]);
      const [firestoreCustomers, setFirestoreCustomers] = useState([]);
      const [cloudProducts, setCloudProducts] = useState([]);
      const [cloudBills, setCloudBills] = useState([]);
      const [showCustSuggestions, setShowCustSuggestions] = useState(false);
      const [showProdSuggestions, setShowProdSuggestions] = useState(false);
      const [editingBillId, setEditingBillId] = useState(null);
      
      // Clean Invoice Rendering Variables
      const [isBillGenerated, setIsBillGenerated] = useState(false);
      const [generatedItems, setGeneratedItems] = useState([]);
      const [notification, setNotification] = useState("");
      
      // Parser State & Autocomplete Fallbacks
      const [parserInput, setParserInput] = useState("");
      const [lastProductName, setLastProductName] = useState("");
      const [showManualInputs, setShowManualInputs] = useState(false);

      // Add/Edit Catalog products
      const [newProdName, setNewProdNameState] = useState("");
      const [newProdCategory, setNewProdCategory] = useState("");
      const [productFilterQuery, setProductFilterQuery] = useState("");

      // Customer Status states
      const [isNewCustomer, setIsNewCustomer] = useState(false);
      const [pendingDiscountPrompt, setPendingDiscountPrompt] = useState(false);
      const [showNewBillModal, setShowNewBillModal] = useState(false);

      // Access passcode protection states
      const [isVerified, setIsVerified] = useState(false);
      const [passwordInput, setPasswordInput] = useState("");

      // Log editor states
      const [editingLogBill, setEditingLogBill] = useState(null);

      // Product Merging variables
      const [mergeSource, setMergeSource] = useState("");
      const [mergeTarget, setMergeTarget] = useState("");

      const custRef = useRef(null);
      const prodRef = useRef(null);
      const parserRef = useRef(null);

      // Helper to generate 3-letter codes
      const getThreeLetterCode = (val) => {
        if (!val) return "GEN";
        const cleaned = val.replace(/[^a-zA-Z]/g, "").toUpperCase();
        return cleaned.slice(0, 3) || "GEN";
      };

      // Space and Case-insensitive normalize helper
      const getNormalizedKey = (str) => {
        if (!str) return "";
        return str.toLowerCase().trim().replace(/\s+/g, ' ');
      };

      // Capitalize first letters elegantly for single-style DB storage
      const toTitleCase = (str) => {
        return str.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
      };

      // Sync customer details and load saved discount rate (x)
      const syncCustomerProfile = async (targetName, cityFromSheet = "") => {
        const { db, appId, doc, getDoc } = window.firebaseBridge;
        if (!db || !targetName.trim()) return;

        try {
          const cleanName = targetName.trim();
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'customers', cleanName);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            const data = docSnap.data();
            setDiscountX(String(data.discount || 0));
            if (data.city) setCustomerCity(data.city);
            setIsNewCustomer(false);
            setPendingDiscountPrompt(false);
          } else {
            setIsNewCustomer(true);
            setPendingDiscountPrompt(true);
            setDiscountX("");
            if (cityFromSheet) setCustomerCity(cityFromSheet);
          }
        } catch (err) {
          console.error("Profile sync exception:", err);
        }
      };

      const handleSaveNewCustomerDiscount = async (enteredDiscount) => {
        const { db, appId, doc, setDoc } = window.firebaseBridge;
        const cleanName = customerName.trim();
        if (!db || !cleanName) return;

        const numDisc = parseFloat(enteredDiscount) || 0;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'customers', cleanName);
          await setDoc(docRef, {
            name: cleanName,
            city: customerCity || "",
            discount: numDisc,
            timestamp: Date.now()
          });
          setDiscountX(String(numDisc));
          setPendingDiscountPrompt(false);
          setIsNewCustomer(false);
          triggerNotification(`Registered ${cleanName} with ${numDisc}%!`);
        } catch (e) {
          console.error("Failed saving customer info:", e);
        }
      };

      // Fetch spreadsheet data dynamically on init
      useEffect(() => {
        const callbackName = "jsonp_callback_" + Math.floor(Math.random() * 100000);
        window[callbackName] = (data) => {
          if (data && data.customers) {
            const parsed = [];
            const rawCustomers = data.customers;
            if (typeof rawCustomers === "object" && !Array.isArray(rawCustomers)) {
              Object.entries(rawCustomers).forEach(([name, details]) => {
                parsed.push({
                  name: name.trim(),
                  city: details ? ((details.City || details.city || "").trim()) : ""
                });
              });
            } else if (Array.isArray(rawCustomers)) {
              rawCustomers.forEach(c => {
                if (typeof c === "string") {
                  parsed.push({ name: c.trim(), city: "" });
                } else if (c && typeof c === "object") {
                  parsed.push({
                    name: (c.Name || c.name || "").trim(),
                    city: (c.City || c.city || "").trim()
                  });
                }
              });
            }
            setDbCustomers(parsed);
          }
        };

        const script = document.createElement("script");
        script.src = `https://script.google.com/macros/s/AKfycbzHDEi_3-0oaLvlPqM3tJdDcMLCdOvr3DNRdl-DDOcAJu_oCJrLCrukhRycnN6nBcwY/exec?action=getData&callback=${callbackName}`;
        document.body.appendChild(script);
      }, []);

      useEffect(() => {
        if (window.firebaseBridge) {
          window.firebaseBridge.onProductsChange = (list) => setCloudProducts(list);
          window.firebaseBridge.onBillsChange = (list) => setCloudBills(list);
          window.firebaseBridge.onCustomersChange = (list) => setFirestoreCustomers(list);
          if (window.firebaseBridge.products.length > 0) setCloudProducts(window.firebaseBridge.products);
          if (window.firebaseBridge.bills.length > 0) setCloudBills(window.firebaseBridge.bills);
          if (window.firebaseBridge.customers.length > 0) setFirestoreCustomers(window.firebaseBridge.customers);
        }
      }, []);

      useEffect(() => {
        function handleClickOutside(event) {
          if (custRef.current && !custRef.current.contains(event.target)) setShowCustSuggestions(false);
          if (prodRef.current && !prodRef.current.contains(event.target)) setShowProdSuggestions(false);
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const handleCustomerBlur = () => {
        setTimeout(() => {
          const val = customerName.trim();
          if (val === "") {
            setCustomerCity("");
            setDiscountX("0");
            setIsNewCustomer(false);
            setPendingDiscountPrompt(false);
            return;
          }
          const match = dbCustomers.find(c => c && c.name && c.name.toLowerCase() === val.toLowerCase()) || 
                        firestoreCustomers.find(c => c && c.name && c.name.toLowerCase() === val.toLowerCase());
          if (match) {
            setCustomerName(match.name);
            setCustomerCity(match.city);
            syncCustomerProfile(match.name, match.city);
          } else {
            syncCustomerProfile(val, "");
          }
        }, 250);
      };

      const triggerNotification = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(""), 4000);
      };

      // Integrated core parser math calculations
      const calculateRateForToken = (codeStr, rawX) => {
        const cleanCode = codeStr.toLowerCase().trim();
        const discountRate = parseFloat(rawX) || 0;

        // Pattern 1: ends with 'n' -> Net Rate: numeric value * 5
        if (cleanCode.endsWith('n')) {
          const val = parseFloat(cleanCode.slice(0, -1));
          return !isNaN(val) ? val * 5 : 0;
        }

        // Pattern 2: ends with 'no' or 'nu' -> code numeric value * 5 - customer discount % (x)
        if (cleanCode.endsWith('no') || cleanCode.endsWith('nu')) {
          const isNo = cleanCode.endsWith('no');
          const val = parseFloat(isNo ? cleanCode.slice(0, -2) : cleanCode.slice(0, -2));
          if (!isNaN(val)) {
            const baseMultiplierPrice = val * 5;
            return baseMultiplierPrice - (baseMultiplierPrice * (discountRate / 100));
          }
          return 0;
        }

        // Pattern 3: plain numerical values represent exact rate entered
        const plainVal = parseFloat(cleanCode);
        return !isNaN(plainVal) ? plainVal : 0;
      };

      // Parser processing submission handler
      const handleParserSubmit = async (e) => {
        e.preventDefault();
        const rawInput = parserInput.trim();
        if (!rawInput) return;

        // Split quantity and detail elements
        const match = rawInput.match(/^(\d+(?:\.\d+)?)\s+(.+)$/);
        if (!match) {
          triggerNotification("Command error: Format must start with quantity (e.g., 12 sehra 20n)");
          return;
        }

        const parsedQty = parseFloat(match[1]);
        const detailsString = match[2].trim();
        const tokens = detailsString.split(/\s+/);

        if (tokens.length === 0) return;

        let codeValue = "—";
        let unitRate = 0;
        let finalProdNameTokens = [...tokens];

        const lastToken = tokens[tokens.length - 1];
        const isNumeric = (str) => !isNaN(parseFloat(str)) && isFinite(str);
        
        const isCodeToken = (str) => {
          const s = str.toLowerCase().trim();
          return s.endsWith('n') || s.endsWith('no') || s.endsWith('nu') || isNumeric(s);
        };

        // Determine if last token acts as pricing rate or discount multiplier code
        if (isCodeToken(lastToken)) {
          codeValue = lastToken;
          unitRate = calculateRateForToken(codeValue, discountX);
          finalProdNameTokens.pop();
        }

        let rawProdName = finalProdNameTokens.join(" ").trim();
        
        // Pick previous item name if product name is blank
        if (!rawProdName) {
          if (lastProductName) {
            rawProdName = lastProductName;
          } else {
            rawProdName = "Item";
          }
          triggerNotification(`Using previous item name: "${rawProdName}"`);
        } else {
          // Store last successfully typed name
          setLastProductName(rawProdName);
        }

        // Normalize spaces and casing to match single style and prevent duplicates
        const normalKey = getNormalizedKey(rawProdName);
        let matchProduct = cloudProducts.find(p => p && p.name && getNormalizedKey(p.name) === normalKey);

        if (!matchProduct) {
          try {
            const displayCasing = toTitleCase(rawProdName);
            const payload = { name: displayCasing, category: "General", code: "", price: "" };
            await window.firebaseBridge.addProductToCloud(payload);
            matchProduct = payload;
            triggerNotification(`Saved product "${displayCasing}" to directory!`);
          } catch (err) {
            console.error("Could not register product dynamically:", err);
          }
        }

        const itemObj = {
          id: Date.now() + Math.random(),
          qty: parsedQty,
          name: matchProduct ? matchProduct.name : rawProdName,
          category: matchProduct ? (matchProduct.category || "General") : "General",
          code: codeValue,
          basePrice: unitRate,
          less: "—", // Modified on Bag Tab
          finalUnitPrice: unitRate,
          totalAmount: parsedQty * unitRate,
          labelType: codeValue.toLowerCase().endsWith('n') ? "Net" : "Standard"
        };

        setAddedItems(prev => [...prev, itemObj]);
        setParserInput("");
        if (parserRef.current) {
          parserRef.current.focus();
        }
        triggerNotification("Item staged below!");
      };

      // Autocomplete helper logic for current parser inputs
      const getParserAutocompleteQuery = () => {
        const trimmed = parserInput.trim();
        if (!trimmed) return "";
        const match = trimmed.match(/^(\d+(?:\.\d+)?)\s+(.*)$/);
        if (match) {
          const rest = match[2].trim();
          const tokens = rest.split(/\s+/);
          if (tokens.length > 0) {
            const lastToken = tokens[tokens.length - 1];
            if (lastToken) {
              const lastTokenLower = lastToken.toLowerCase();
              if (lastTokenLower.endsWith('n') || lastTokenLower.endsWith('no') || lastTokenLower.endsWith('nu') || (!isNaN(parseFloat(lastTokenLower)) && isFinite(lastTokenLower))) {
                tokens.pop();
              }
            }
          }
          return tokens.join(" ");
        }
        if (isNaN(parseFloat(trimmed.split(/\s+/)[0]))) {
          return trimmed;
        }
        return "";
      };

      const selectParserSuggestion = (prodName) => {
        const trimmed = parserInput.trimStart();
        const match = trimmed.match(/^(\d+(?:\.\d+)?)\s+(.*)$/);
        let newQty = "1";
        if (match) {
          newQty = match[1];
        }
        setParserInput(`${newQty} ${prodName} `);
        if (parserRef.current) {
          parserRef.current.focus();
        }
      };

      // Optional manual input backup submission
      const handleManualAddItem = async () => {
        const queryName = productSearch.trim();
        if (!queryName) {
          triggerNotification("No product selected!");
          return;
        }

        const manualRate = parseFloat(price) || 0;
        const manualQty = parseFloat(qty) || 1;

        const normalKey = getNormalizedKey(queryName);
        let matchProduct = cloudProducts.find(p => p && p.name && getNormalizedKey(p.name) === normalKey);

        if (!matchProduct) {
          try {
            const displayCasing = toTitleCase(queryName);
            const payload = { name: displayCasing, category: "General", code: "", price: "" };
            await window.firebaseBridge.addProductToCloud(payload);
            matchProduct = payload;
          } catch (e) {
            console.error(e);
          }
        }

        const finalRate = code ? calculateRateForToken(code, discountX) : manualRate;

        const manualItem = {
          id: Date.now() + Math.random(),
          qty: manualQty,
          name: matchProduct ? matchProduct.name : queryName,
          category: matchProduct ? (matchProduct.category || "General") : "General",
          code: code || "—",
          basePrice: finalRate,
          less: less || "—",
          finalUnitPrice: finalRate,
          totalAmount: manualQty * finalRate,
          labelType: "Manual"
        };

        setAddedItems(prev => [...prev, manualItem]);
        setProductSearch(""); setCode(""); setPrice(""); setLess(""); setQty("1");
        setShowManualInputs(false);
        triggerNotification("Item added manual form!");
      };

      // Dynamic Checklist state moves item directly to "Bag Tab" WITHOUT tab switching
      const handleTalliedCheck = (stagedItem) => {
        // Remove from Staged Pool (addedItems)
        setAddedItems(prev => prev.filter(i => i.id !== stagedItem.id));
        // Add to Bag Array (baggedItems) with default 'less' matching client discount rate if code matched 'no' or 'nu'
        const bagObj = { ...stagedItem };
        setBaggedItems(prev => [...prev, bagObj]);

        // Retains user in Tab 1, only triggers notification
        triggerNotification(`Tallied "${stagedItem.name}" to Bag!`);
      };

      // Apply/Change Less percentage or flat rate modifications inside Tab 2 Bag list
      const handleUpdateLessInBag = (itemId, lessStr) => {
        setBaggedItems(prev => prev.map(item => {
          if (item.id === itemId) {
            let deduction = 0;
            const cleanLess = lessStr.trim().toLowerCase();
            const numericDiscount = parseFloat(discountX) || 0;

            if (cleanLess.endsWith('%')) {
              // Extract numeric percentage
              const pct = parseFloat(cleanLess.slice(0, -1)) || 0;
              deduction = item.basePrice * (pct / 100);
            } else if (cleanLess === 'x%' || cleanLess === 'x') {
              // Applies client linked discount rate percentage (x)
              deduction = item.basePrice * (numericDiscount / 100);
            } else if (cleanLess !== "" && cleanLess !== "—") {
              // Flat numeric rate subtraction
              deduction = parseFloat(cleanLess) || 0;
            }

            const calculatedFinalRate = Math.max(0, item.basePrice - deduction);
            return {
              ...item,
              less: lessStr,
              finalUnitPrice: calculatedFinalRate,
              totalAmount: item.qty * calculatedFinalRate
            };
          }
          return item;
        }));
      };

      // Clear layout and reset back to draft sheet
      const handleResetAll = () => {
        setCustomerName(""); setCustomerCity(""); setDiscountX("0");
        setQty("1"); setProductSearch(""); setSelectedProduct(null); setCode(""); setPrice(""); setLess("");
        setAddedItems([]); setBaggedItems([]); setGeneratedItems([]); setIsBillGenerated(false); setEditingBillId(null);

      // Perform clean submission output rendering, download PDF instantly, and trigger printing automatically
      const handleGenerateCleanBill = async () => {

              city: customerCity || "",
              discount: parseFloat(discountX) || 0,

            console.error("Database storage exception:", err);
          }

        // Automatic actions: Compile and download PDF receipt directly (No copy button, perfectly formatted!)
        try {
          downloadReceiptPDFDirectly(baggedItems, finalClientName, customerCity, billDate);
        } catch (pdfErr) {
          console.error("Direct PDF generation error:", pdfErr);
          triggerNotification("Could not compile PDF. Launching standard print...");

        setTimeout(() => {
          window.print();

      const handleQuickSuggestionClick = (prod) => {
        setParserInput(prev => {
          const matchQty = prev.match(/^\d+(\.\d+)?\s+/);

          return `${currentQtyPrefix}${prod.name} `;

        if (parserRef.current) {
          parserRef.current.focus();
        }

      // Safeguarded catalog list helper preventing null crash
      const getSortedProducts = () => {
        if (!cloudProducts || !Array.isArray(cloudProducts)) return [];
        return [...cloudProducts]
          .filter(p => p && typeof p === 'object' && p.name)
          .sort((a, b) => {
            const catA = (a.category || "General").trim();
            const catB = (b.category || "General").trim();
            const catComp = catA.localeCompare(catB, undefined, { sensitivity: 'base' });
            if (catComp !== 0) return catComp;
            const nameA = (a.name || "").trim();
            const nameB = (b.name || "").trim();
            return nameA.localeCompare(nameB, undefined, { sensitivity: 'base' });
          });
      };

      const getTopTwentyProducts = () => {
        return getSortedProducts().slice(0, 20);
      };

      const filteredProductsForBilling = query => {
        const sorted = getSortedProducts();
        if (!query.trim()) return sorted.slice(0, 15);
        return sorted.filter(p => 
          p && p.name && p.name.toLowerCase().includes(query.toLowerCase()) ||
          (p && p.category && p.category.toLowerCase().includes(query.toLowerCase()))
        ).slice(0, 15);

        );

          triggerNotification(`Duplicate entry error: "${trimmed}" already cataloged!`);
          return;

        const targetDisplayName = toTitleCase(trimmed);
        const payload = { name: targetDisplayName, category: cat, code: "", price: "" };

            await window.firebaseBridge.addProductToCloud(payload);

            console.error(err);

      // Integrated product merge resolution block
      const handleProductMerge = async () => {
        const source = mergeSource.trim();
        const target = mergeTarget.trim();
        if (!source || !target) {
          triggerNotification("Specify both source and target names.");
          return;
        }

        const sourceItem = cloudProducts.find(p => p && p.name && getNormalizedKey(p.name) === getNormalizedKey(source));
        const targetItem = cloudProducts.find(p => p && p.name && getNormalizedKey(p.name) === getNormalizedKey(target));

        if (!sourceItem || !targetItem) {
          triggerNotification("Both catalog products must exist to merge.");
          return;
        }

        try {
          await window.firebaseBridge.deleteProductFromCloud(sourceItem.id);
          
          setAddedItems(prev => prev.map(item => {
            if (item && item.name && getNormalizedKey(item.name) === getNormalizedKey(source)) {
              return { ...item, name: targetItem.name, category: targetItem.category || "General" };
            }
            return item;
          }));

          setBaggedItems(prev => prev.map(item => {
            if (item && item.name && getNormalizedKey(item.name) === getNormalizedKey(source)) {

            return item;

          setMergeTarget("");

        try {
          // Recompute total amount
          const computedTotal = (editingLogBill.items || []).reduce((sum, item) => sum + (item.totalAmount || 0), 0);
          const updatedBill = {
            ...editingLogBill,
            totalAmount: computedTotal

        });

          const qty = parseFloat(value) || 0;
          nextItems[index] = {

            totalAmount: qty * nextItems[index].finalUnitPrice

          return { ...prev, items: nextItems };

        setEditingLogBill(prev => {
          const nextItems = [...(prev.items || [])];
          const cleanLess = value.trim().toLowerCase();
          const discountRate = parseFloat(prev.discountRate) || 0;
          let deduction = 0;

          if (cleanLess.endsWith('%')) {
            const pct = parseFloat(cleanLess.slice(0, -1)) || 0;
            deduction = nextItems[index].basePrice * (pct / 100);
          } else if (cleanLess === 'x%' || cleanLess === 'x') {
            deduction = nextItems[index].basePrice * (discountRate / 100);
          } else if (cleanLess !== "" && cleanLess !== "—") {
            deduction = parseFloat(cleanLess) || 0;

          const calculatedFinalRate = Math.max(0, nextItems[index].basePrice - deduction);
          const nextItem = {
            ...nextItems[index],
            less: value,
            finalUnitPrice: calculatedFinalRate,
            totalAmount: nextItems[index].qty * calculatedFinalRate

      const grossCalculatedSum = baggedItems.reduce((acc, i) => acc + (i.totalAmount || 0), 0);

          <main className="flex-grow max-w-md w-full mx-auto p-2 flex flex-col gap-2 overflow-hidden bg-stone-50 no-print">

                        <input type="date" value={billDate} onChange={(e) => setBillDate(e.target.value)} className="w-full px-2 py-2 text-xs bg-stone-50 border border-stone-200 rounded-lg font-mono font-semibold" />
                      </div>
                    </div>

                    {/* New Customer Save block */}
                    {pendingDiscountPrompt && (
                      <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-stone-800 space-y-1.5 animate-fadeIn">

                          <i className="fa-solid fa-user-plus text-sm"></i> Customer Configuration

                        <div className="flex gap-2">

                            type="number"

                            Save Client

                        </div>
                      </div>

                  </div>

                  {/* Top 20 Scrollable Suggestions Matrix */}
                  <div className="bg-white p-2.5 rounded-xl border border-stone-200 shadow-sm no-print space-y-1.5">

                    </div>
                  </div>

                                <div className="flex gap-2 font-sans font-semibold font-bold">
                                  <button type="button" onClick={() => handleLoadHistoricalBill(b)} className="px-2 py-1 bg-stone-900 text-white rounded font-bold text-[9px] font-sans font-sans font-semibold">Load Manifest</button>
                                  <button type="button" onClick={() => openLogEditor(b)} className="px-2 py-1 bg-amber-600 text-white rounded font-bold text-[9px] font-sans font-sans font-sans font-semibold"><i className="fa-solid fa-pen-to-square font-sans"></i> Edit</button>
                                  <button type="button" onClick={() => deleteBillLogEntry(b.id)} className="px-2 py-1 bg-rose-600 text-white rounded font-bold text-[9px] font-sans font-sans font-sans font-semibold"><i className="fa-solid fa-trash-can font-sans"></i> Delete</button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* Sticky App-Style Tab Navigation Bar (Anchored at bottom for thumb-access) */}
          <footer className="bg-stone-900 border-t border-stone-800 py-2 px-4 no-print flex-shrink-0 z-40 shadow-lg">
            <div className="max-w-md mx-auto flex justify-around items-center font-sans font-bold">
              <button 
                type="button"
                onClick={() => setCurrentTab("bill")} 
                className={`flex flex-col items-center gap-1 py-1 px-3 transition-colors ${currentTab === "bill" ? "text-amber-400 font-bold" : "text-stone-400 hover:text-stone-200"}`}
              >
                <i className="fa-solid fa-receipt text-base font-sans"></i>
                <span className="text-[9px] uppercase tracking-wider font-sans">New Bill</span>
              </button>
              
              <button 
                type="button"
                onClick={() => setCurrentTab("bag")} 
                className={`flex flex-col items-center gap-1 py-1 px-3 transition-colors relative ${currentTab === "bag" ? "text-amber-400 font-bold" : "text-stone-400 hover:text-stone-200"}`}
              >
                <i className="fa-solid fa-bag-shopping text-base font-sans"></i>
                <span className="text-[9px] uppercase tracking-wider font-sans">Bag</span>
                {baggedItems.length > 0 && (
                  <span className="absolute -top-1 right-2.5 bg-rose-600 text-white text-[9px] font-black h-4 w-4 rounded-full flex items-center justify-center animate-bounce font-sans font-bold font-semibold">
                    {baggedItems.length}
                  </span>
                )}
              </button>
              
              <button 
                type="button"
                onClick={() => setCurrentTab("products")} 
                className={`flex flex-col items-center gap-1 py-1 px-3 transition-colors ${currentTab === "products" ? "text-amber-400 font-bold" : "text-stone-400 hover:text-stone-200"}`}
              >
                <i className="fa-solid fa-box-open text-base font-sans"></i>
                <span className="text-[9px] uppercase tracking-wider font-sans font-semibold">Catalog</span>
              </button>
              
              <button 
                type="button"
                onClick={() => setCurrentTab("logs")} 
                className={`flex flex-col items-center gap-1 py-1 px-3 transition-colors ${currentTab === "logs" ? "text-amber-400 font-bold" : "text-stone-400 hover:text-stone-200"}`}
              >
                <i className="fa-solid fa-clock-rotate-left text-base font-sans"></i>
                <span className="text-[9px] uppercase tracking-wider font-sans font-sans font-semibold">Logs</span>
              </button>
            </div>
          </footer>

          {/* Ultimate Clean End-to-End POS printable Receipt layout (STAYS PERMANENTLY IN DOM FOR PRINT SUCCESS) */}
          <div id="printable-bill-invoice" className="p-1 text-black font-mono text-[14px] font-extrabold leading-tight">
            <div className="text-center pb-1.5 mb-1.5 border-b border-black">
              <h2 className="text-sm font-black uppercase tracking-wider">ESTIMATE RECEIPT</h2>
              <p className="text-[9px] font-extrabold">Rough Statement Profile</p>
              
              <div className="mt-1 text-center text-[11px] font-black border-y border-dashed border-black py-1">
                {getThreeLetterCode(customerName)} ({getThreeLetterCode(customerCity)}) - {billDate}
              </div>
            </div>
            
            {/* Exactly 4 Columns: QT | ITEM | P | AMT (With exactly single space inside label) */}
            <table className="w-full text-left mt-1 border-collapse text-[14px] font-black">
              <thead>
                <tr className="border-b border-black text-[12px] font-black uppercase">
                  <th className="py-1 w-6 text-center">QT</th>
                  <th className="py-1 pl-1">ITEM</th>
                  <th className="py-1 text-right w-14">P</th>
                  <th className="py-1 text-right w-14">AMT</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-stone-200">
                {generatedItems.map((item, idx) => {
                  const cleanCode = (item.code && item.code !== "—") ? item.code.trim() : "";
                  const itemLabel = (item.name.trim() + " " + cleanCode).replace(/\s+/g, ' ').trim().toUpperCase();
                  return (
                    <tr key={idx} className="align-top font-black text-[14px]">
                      <td className="py-1 text-center font-mono">{item.qty}</td>
                      <td className="py-1 font-black uppercase whitespace-pre-wrap break-all pl-1 leading-tight">{itemLabel}</td>
                      <td className="py-1 text-right font-mono">{item.finalUnitPrice.toFixed(2)}</td>
                      <td className="py-1 text-right font-mono font-black">{item.totalAmount.toFixed(2)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            
            <div className="mt-2.5 pt-1.5 border-t border-dashed border-black text-right space-y-1 text-[13px] font-black">
              <div className="flex justify-between font-extrabold">
                <span>Gross Aggregation:</span>
                <span>{generatedItems.reduce((acc, i) => acc + (i.totalAmount || 0), 0).toFixed(2)}</span>
              </div>
              <div className="flex justify-between text-[14px] font-black border-t border-black pt-1">
                <span>Net Liability:</span>
                <span>{generatedItems.reduce((acc, i) => acc + (i.totalAmount || 0), 0).toFixed(2)}</span>
              </div>
            </div>
          </div>

          {/* New Bill Confirmation Modal */}
          {showNewBillModal && (
            <div className="absolute inset-0 bg-stone-900/80 z-50 flex items-center justify-center p-4 animate-fadeIn">
              <div className="bg-white rounded-2xl max-w-sm w-full p-5 space-y-4 shadow-xl border border-stone-200 animate-fadeIn font-sans font-bold">
                <div className="text-stone-900 font-bold text-sm flex items-center gap-1.5 font-sans font-sans font-bold">
                  <i className="fa-solid fa-circle-exclamation text-rose-500 text-lg font-sans"></i> Reset Draft?
                </div>
                <p className="text-xs text-stone-600 font-sans font-semibold">Are you sure you want to initialize a new bill? Staged and Bagged entries will be discarded.</p>
                <div className="flex gap-2.5 justify-end font-sans">
                  <button type="button" onClick={() => setShowNewBillModal(false)} className="px-4 py-2 bg-stone-100 hover:bg-stone-200 text-stone-800 rounded-lg text-xs font-bold font-sans">Cancel</button>
                  <button type="button" onClick={() => { handleResetAll(); setShowNewBillModal(false); }} className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-xs font-bold font-sans font-semibold">Confirm Reset</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
