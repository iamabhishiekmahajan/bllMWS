
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rough Bill Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- html2pdf.js for clean PDF download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['Courier Prime', 'monospace'],
          }
        }

    }
  </script>

<body class="bg-stone-50 text-stone-900 min-h-screen font-sans antialiased selection:bg-stone-300">

  <div id="root" class="min-h-screen flex flex-col"></div>

  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'minimalistic-rough-bill-gen';
    const firebaseConfig = {
      apiKey: "AIzaSyC4ha5NdXyCFOYW8QApcWohBo_6BS6wGRk",
      authDomain: "myroughbillapp.firebaseapp.com",
      projectId: "myroughbillapp",
      storageBucket: "myroughbillapp.firebasestorage.app",
      messagingSenderId: "683327665576",
      appId: "1:683327665576:web:ecb33e232260125397199d"
    };

    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.warn("Could not load real Firebase credentials.", e);
    }

    window.firebaseBridge = {
      db, auth, appId, connected: false,
      products: [], bills: [], customers: [],
      doc, getDoc, setDoc, collection, addDoc, updateDoc, deleteDoc
    };

    async function startSetup() {
      if (!db) return;
      try {
        if (auth) await signInAnonymously(auth);
      } catch (e) {
        console.warn("Auth initialization skipped.");
      }

      window.firebaseBridge.connected = true;

      // Realtime Products Synchronizer
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), (snapshot) => {
        const list = [];
        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
        window.firebaseBridge.products = list;
        if (window.firebaseBridge.onProductsChange) window.firebaseBridge.onProductsChange(list);
      });

      // Realtime Bills Synchronizer
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'bills'), (snapshot) => {
        const list = [];
        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
        list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        window.firebaseBridge.bills = list;
        if (window.firebaseBridge.onBillsChange) window.firebaseBridge.onBillsChange(list);
      });

      // Realtime Customers Registry Sync
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), (snapshot) => {
        const list = [];
        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
        window.firebaseBridge.customers = list;
        if (window.firebaseBridge.onCustomersChange) window.firebaseBridge.onCustomersChange(list);
      });
    }

    window.firebaseBridge.saveBillToCloud = async (bill) => await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'bills'), { ...bill, timestamp: Date.now() });
    window.firebaseBridge.updateBillInCloud = async (id, bill) => await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bills', id), { ...bill, timestamp: Date.now() });
    window.firebaseBridge.addProductToCloud = async (prod) => {
      // Normalize to prevent duplicates before calling database writing
      const list = window.firebaseBridge.products;
      const isDuplicate = list.some(p => p.name.trim().toLowerCase() === prod.name.trim().toLowerCase() && p.category.trim().toLowerCase() === prod.category.trim().toLowerCase());
      if (isDuplicate) return;
      return await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { ...prod, timestamp: Date.now() });
    };
    window.firebaseBridge.deleteProductFromCloud = async (id) => await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));

    startSetup();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [currentTab, setCurrentTab] = useState("bill");
      const [customerName, setCustomerName] = useState("");
      const [customerCity, setCustomerCity] = useState("");
      const [billDate, setBillDate] = useState(new Date().toISOString().split('T')[0]);
      
      const [discountX, setDiscountX] = useState("0"); 
      const [qty, setQty] = useState("1");
      const [productSearch, setProductSearch] = useState("");
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [code, setCode] = useState("");
      const [price, setPrice] = useState("");
      const [addedItems, setAddedItems] = useState([]);
      const [dbCustomers, setDbCustomers] = useState([]);
      const [firestoreCustomers, setFirestoreCustomers] = useState([]);
      const [cloudProducts, setCloudProducts] = useState([]);
      const [cloudBills, setCloudBills] = useState([]);
      const [showCustSuggestions, setShowCustSuggestions] = useState(false);
      const [showProdSuggestions, setShowProdSuggestions] = useState(false);
      const [editingBillId, setEditingBillId] = useState(null);
      const [isBillGenerated, setIsBillGenerated] = useState(false);
      const [generatedItems, setGeneratedItems] = useState([]);
      const [notification, setNotification] = useState("");
      
      // UI Modes & Toggles
      const [showBulkMode, setShowBulkMode] = useState(false);
      const [bulkInput, setBulkInput] = useState("");

      const [newProdName, setNewProdNameState] = useState("");
      const [newProdCategory, setNewProdCategory] = useState("");
      const [productFilterQuery, setProductFilterQuery] = useState("");

      // Customer Status States
      const [isNewCustomer, setIsNewCustomer] = useState(false);
      const [pendingDiscountPrompt, setPendingDiscountPrompt] = useState(false);

      // WebUSB Thermal Printer States
      const [printerDevice, setPrinterDevice] = useState(null);
      const [printerStatus, setPrinterStatus] = useState("Disconnected");

      // Password Log Verification State
      const [isVerified, setIsVerified] = useState(false);
      const [passwordInput, setPasswordInput] = useState("");

      // Product Merging State
      const [mergeSource, setMergeSource] = useState("");
      const [mergeTarget, setMergeTarget] = useState("");

      const custRef = useRef(null);
      const prodRef = useRef(null);

      // Helper to generate 3-letter codes
      const getThreeLetterCode = (val) => {
        if (!val) return "GEN";
        const cleaned = val.replace(/[^a-zA-Z]/g, "").toUpperCase();
        return cleaned.slice(0, 3) || "GEN";
      };

      // Search and match customer profile in cloud
      const syncCustomerProfile = async (targetName, cityFromSheet = "") => {
        const { db, appId, doc, getDoc } = window.firebaseBridge;
        if (!db || !targetName.trim()) return;

        try {
          const cleanName = targetName.trim();
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'customers', cleanName);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            const data = docSnap.data();
            setDiscountX(String(data.discount || 0));
            if (data.city) setCustomerCity(data.city);
            setIsNewCustomer(false);
            setPendingDiscountPrompt(false);
          } else {
            // New Customer detected - triggers prompt
            setIsNewCustomer(true);
            setPendingDiscountPrompt(true);
            setDiscountX("");
            if (cityFromSheet) setCustomerCity(cityFromSheet);
          }
        } catch (err) {
          console.error("Profile sync exception:", err);
        }
      };

      const handleSaveNewCustomerDiscount = async (enteredDiscount) => {
        const { db, appId, doc, setDoc } = window.firebaseBridge;
        const cleanName = customerName.trim();
        if (!db || !cleanName) return;

        const numDisc = parseFloat(enteredDiscount) || 0;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'customers', cleanName);
          await setDoc(docRef, {
            name: cleanName,
            city: customerCity || "",
            discount: numDisc,
            timestamp: Date.now()
          });
          setDiscountX(String(numDisc));
          setPendingDiscountPrompt(false);
          setIsNewCustomer(false);
          triggerNotification(`Success: Registered ${cleanName} with ${numDisc}% discount!`);
        } catch (e) {
          console.error("Failed saving new customer configuration:", e);
        }
      };

      // Pull Google Sheets customer list dynamically
      useEffect(() => {
        const callbackName = "jsonp_callback_" + Math.floor(Math.random() * 100000);
        window[callbackName] = (data) => {
          if (data && data.customers) {
            const parsed = [];
            const rawCustomers = data.customers;
            if (typeof rawCustomers === "object" && !Array.isArray(rawCustomers)) {
              Object.entries(rawCustomers).forEach(([name, details]) => {
                parsed.push({
                  name: name.trim(),
                  city: details ? ((details.City || details.city || "").trim()) : ""
                });
              });
            } else if (Array.isArray(rawCustomers)) {
              rawCustomers.forEach(c => {
                if (typeof c === "string") {
                  parsed.push({ name: c.trim(), city: "" });
                } else if (c && typeof c === "object") {
                  parsed.push({
                    name: (c.Name || c.name || "").trim(),
                    city: (c.City || c.city || "").trim()
                  });
                }
              });
            }
            setDbCustomers(parsed);
          }
        };

        const script = document.createElement("script");
        script.src = `https://script.google.com/macros/s/AKfycbzHDEi_3-0oaLvlPqM3tJdDcMLCdOvr3DNRdl-DDOcAJu_oCJrLCrukhRycnN6nBcwY/exec?action=getData&callback=${callbackName}`;
        document.body.appendChild(script);
      }, []);

      useEffect(() => {
        if (window.firebaseBridge) {
          window.firebaseBridge.onProductsChange = (list) => setCloudProducts(list);
          window.firebaseBridge.onBillsChange = (list) => setCloudBills(list);
          window.firebaseBridge.onCustomersChange = (list) => setFirestoreCustomers(list);
          if (window.firebaseBridge.products.length > 0) setCloudProducts(window.firebaseBridge.products);
          if (window.firebaseBridge.bills.length > 0) setCloudBills(window.firebaseBridge.bills);
          if (window.firebaseBridge.customers.length > 0) setFirestoreCustomers(window.firebaseBridge.customers);
        }
      }, []);

      useEffect(() => {
        function handleClickOutside(event) {
          if (custRef.current && !custRef.current.contains(event.target)) setShowCustSuggestions(false);
          if (prodRef.current && !prodRef.current.contains(event.target)) setShowProdSuggestions(false);
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const handleCodeChange = (val) => {
        setCode(val);
        const cleaned = val.trim().toLowerCase();
        if (cleaned !== "") {
          const isNet = cleaned.endsWith('n');
          const numPart = parseFloat(isNet ? cleaned.slice(0, -1) : cleaned);
          if (!isNaN(numPart)) {
            const computed = numPart * 5;
            setPrice(computed > 0 ? computed.toString() : "");
          }
        } else {
          setPrice("");
        }
      };

      const handleCustomerBlur = () => {
        setTimeout(() => {
          const val = customerName.trim();
          if (val === "") {
            setCustomerCity("");
            setDiscountX("0");
            setIsNewCustomer(false);
            setPendingDiscountPrompt(false);
            return;
          }
          const match = dbCustomers.find(c => c.name.toLowerCase() === val.toLowerCase()) || 
                        firestoreCustomers.find(c => c.name.toLowerCase() === val.toLowerCase());
          if (match) {
            setCustomerName(match.name);
            setCustomerCity(match.city);
            syncCustomerProfile(match.name, match.city);
          } else {
            syncCustomerProfile(val, "");
          }
        }, 200);
      };

      const triggerNotification = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(""), 4000);
      };

      // Method 2: Bulk Entry Parser with fallback to previous product name if missing (Case-Insensitive Database Checks)
      const processBulkAdd = async () => {
        const tokens = bulkInput.trim().split(/\s+/);
        const newItems = [];
        let i = 0;
        const numericDiscount = parseFloat(discountX) || 0;
        let lastProductName = "";

        while (i < tokens.length) {
          let token1 = tokens[i++];
          if (!token1) break;

          let q = parseInt(token1);
          let n = "";
          let c = "";

          if (isNaN(q)) {
            triggerNotification("Parsing Error: Elements must begin with a Quantity number.");
            return;
          }

          let nextToken = tokens[i++];
          const isTokenPriceOrCode = (t) => {
            if (!t) return false;
            return t.toLowerCase().endsWith('n') || t.toLowerCase().endsWith('no') || !isNaN(parseFloat(t));
          };

          if (isTokenPriceOrCode(nextToken)) {
            if (!lastProductName) {
              triggerNotification("Parser Error: No prior product name staged in memory.");
              return;
            }
            n = lastProductName;
            c = nextToken;
          } else {
            n = nextToken || "Item";
            c = tokens[i++] || "0";
            lastProductName = n; 
          }

          let calculatedUnitPrice = 0;
          const cleanedCode = c.toLowerCase();
          
          if (cleanedCode.endsWith('n')) {
            calculatedUnitPrice = parseFloat(cleanedCode.slice(0, -1)) * 5;
          } else if (cleanedCode.endsWith('no')) {
            const base = parseFloat(cleanedCode.slice(0, -2)) * 5;
            calculatedUnitPrice = base - (base * (numericDiscount / 100));
          } else {
            calculatedUnitPrice = parseFloat(cleanedCode);
          }

          // Case insensitive comparison and duplication avoidance
          const isKnownProduct = cloudProducts.some(p => p.name.trim().toLowerCase() === n.trim().toLowerCase());
          if (!isKnownProduct && n && n !== "Item") {
            const payload = { name: n, category: "General", code: "", price: "" };
            await window.firebaseBridge.addProductToCloud(payload);
          }

          // Fetch correct matched casing from cloud database if existed
          const matchedCloudProd = cloudProducts.find(p => p.name.trim().toLowerCase() === n.trim().toLowerCase());
          const finalDisplayName = matchedCloudProd ? matchedCloudProd.name : n;

          newItems.push({
            id: Date.now() + Math.random(),
            qty: q,
            name: finalDisplayName,
            category: matchedCloudProd?.category || "General",
            code: c,
            basePrice: calculatedUnitPrice,
            finalUnitPrice: calculatedUnitPrice,
            totalAmount: q * calculatedUnitPrice,
            isOverride: false,
            labelType: "BulkStream"
          });
        }

        if (newItems.length > 0) {
          setAddedItems(prev => [...prev, ...newItems]);
          setBulkInput("");
          setShowBulkMode(false);
          triggerNotification(`Added ${newItems.length} items to pool!`);
        }
      };

      const handleAddItem = async () => {
        const queryName = productSearch.trim();
        if (!queryName) {
          triggerNotification("Please type or select a product!");
          return;
        }

        const enteredPrice = parseFloat(price) || 0;
        if (enteredPrice <= 0) {
          triggerNotification("Item price must be greater than 0!");
          return;
        }
        const parsedQty = parseFloat(qty || "1") || 1;

        // Automatically store new products to cloud catalog (Strict case-insensitive check and duplication prevention)
        const exactMatch = cloudProducts.find(p => p.name.trim().toLowerCase() === queryName.toLowerCase());
        let productObj = exactMatch;
        if (!exactMatch) {
          try {
            const payload = { name: queryName, category: "General", code: "", price: "" };
            await window.firebaseBridge.addProductToCloud(payload);
            productObj = payload;
            triggerNotification(`Added new product "${queryName}" to catalog list.`);
          } catch(e) {
            console.error("New product auto-add failed:", e);
          }
        }

        let expectedPrice = enteredPrice;
        let isOverride = false;
        const cleanedCode = code.trim().toLowerCase();
        
        if (cleanedCode !== "" && cleanedCode !== "—") {
          const isNet = cleanedCode.endsWith('n');
          const isDisc = cleanedCode.endsWith('no');
          const valString = isNet ? cleanedCode.slice(0, -1) : isDisc ? cleanedCode.slice(0, -2) : cleanedCode;
          const codeVal = parseFloat(valString);
          
          if (!isNaN(codeVal)) {
            const baseMultiplier = codeVal * 5;
            if (isNet) {
              expectedPrice = baseMultiplier;
            } else {
              const discountVal = parseFloat(discountX) || 0;
              expectedPrice = baseMultiplier - (baseMultiplier * (discountVal / 100));
            }
          }
          if (Math.abs(expectedPrice - enteredPrice) > 0.01) {
            isOverride = true;
          }
        }
        
        setAddedItems(prev => [...prev, {
          id: Date.now(),
          qty: parsedQty,
          name: productObj.name,
          category: productObj.category || "General",
          code: code.trim() || "—",
          basePrice: enteredPrice,
          finalUnitPrice: enteredPrice,
          totalAmount: parsedQty * enteredPrice,
          isOverride: isOverride,
          labelType: code.trim().toLowerCase().endsWith('n') ? "Net" : "Manual"
        }]);
        setCode(""); setPrice(""); setProductSearch(""); setSelectedProduct(null); setQty("1");
        triggerNotification("Product staged successfully!");
      };

      // Merge product catalog entries together
      const handleProductMerge = async () => {
        const source = mergeSource.trim();
        const target = mergeTarget.trim();
        if (!source || !target) {
          triggerNotification("Specify both source and target names.");
          return;
        }

        const sourceItem = cloudProducts.find(p => p.name.trim().toLowerCase() === source.toLowerCase());
        const targetItem = cloudProducts.find(p => p.name.trim().toLowerCase() === target.toLowerCase());

        if (!sourceItem || !targetItem) {
          triggerNotification("Both products must exist in database to merge.");
          return;
        }

        try {
          // 1. Delete source item
          await window.firebaseBridge.deleteProductFromCloud(sourceItem.id);

          // 2. Map existing staged items
          setAddedItems(prev => prev.map(item => {
            if (item.name.trim().toLowerCase() === source.toLowerCase()) {
              return { ...item, name: targetItem.name, category: targetItem.category || "General" };
            }
            return item;
          }));

          setMergeSource("");
          setMergeTarget("");
          triggerNotification(`Successfully merged "${source}" into "${target}"!`);
        } catch (e) {
          console.error("Merging error:", e);
        }
      };

      // Google Sheets Automated Synchronization Pipeline (Store Ledger Transactions with final bill amount)
      const saveLedgerTransactionToSheet = async (clientName, invoiceAmount) => {
        const sheetsScriptUrl = "https://script.google.com/macros/s/AKfycbzHDEi_3-0oaLvlPqM3tJdDcMLCdOvr3DNRdl-DDOcAJu_oCJrLCrukhRycnN6nBcwY/exec";
        try {
          const finalCleanAmount = parseFloat(invoiceAmount).toFixed(2);
          // Pass cleanly mapped parameters including the correct calculated transaction total
          await fetch(`${sheetsScriptUrl}?action=addTransaction&name=${encodeURIComponent(clientName)}&amount=${finalCleanAmount}&date=${billDate}&type=bill`, {
            method: "GET",
            mode: "no-cors"
          });
          triggerNotification("Transaction Ledger updated in Google Sheets!");
        } catch (sheetsErr) {
          console.error("Sheets transactions update failure:", sheetsErr);
        }
      };

      const connectWebUsbPrinter = async () => {
        try {
          const device = await navigator.usb.requestDevice({ filters: [] });
          await device.open();
          await device.selectConfiguration(1);
          await device.claimInterface(0);
          setPrinterDevice(device);
          setPrinterStatus("Connected to USB Printer (80mm)");
          triggerNotification("WebUSB Thermal Printer connected!");
        } catch (e) {
          setPrinterStatus("Failed Connection");
          console.error(e);
        }
      };

      const handleGenerateClick = async () => {
        if (addedItems.length === 0) return;
        const numericDiscount = parseFloat(discountX) || 0;
        const activeCustomer = customerName.trim() || "Walk-In Customer";

        const { db, appId, doc, setDoc } = window.firebaseBridge;
        if (db && activeCustomer !== "Walk-In Customer") {
          try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'customers', activeCustomer);
            await setDoc(docRef, {
              name: activeCustomer,
              city: customerCity || "",
              discount: numericDiscount,
              timestamp: Date.now()
            }, { merge: true });
          } catch (e) {
            console.error("Cloud parameters update failure:", e);
          }
        }

        const finalCalculatedItems = addedItems.map(item => {
          let finalPrice = item.basePrice;
          let labelType = item.labelType;

          if (item.code !== "—" && item.code !== "" && labelType !== "BulkStream") {
            const cleanedNumStr = item.code.toLowerCase();
            const isNet = cleanedNumStr.endsWith('n');
            const numericPart = parseFloat(isNet ? cleanedNumStr.slice(0, -1) : cleanedNumStr) || 0;
            const basePrice = numericPart * 5;

            if (isNet) {
              finalPrice = basePrice;
              labelType = "Net";
            } else {
              finalPrice = basePrice - (basePrice * (numericDiscount / 100));
              labelType = "Disc";
            }
          }
          return { ...item, finalUnitPrice: finalPrice, totalAmount: item.qty * finalPrice, labelType };
        });

        finalCalculatedItems.sort((a, b) => a.name.localeCompare(b.name));
        setGeneratedItems(finalCalculatedItems);
        setIsBillGenerated(true);

        const calculatedBillTotal = finalCalculatedItems.reduce((sum, i) => sum + i.totalAmount, 0);

        if (activeCustomer !== "Walk-In Customer") {
          await saveLedgerTransactionToSheet(activeCustomer, calculatedBillTotal);
        }

        if (db && window.firebaseBridge.connected) {
          const rawBillObject = {
            customerName: activeCustomer,
            customerCity: customerCity || "",
            date: billDate,
            items: finalCalculatedItems,
            totalAmount: calculatedBillTotal,
            discountRate: numericDiscount
          };

          try {
            if (editingBillId) {
              await window.firebaseBridge.updateBillInCloud(editingBillId, rawBillObject);
            } else {
              const docRef = await window.firebaseBridge.saveBillToCloud(rawBillObject);
              if (docRef?.id) setEditingBillId(docRef.id);
            }
            triggerNotification("Invoice copy generated & synchronized!");
          } catch (err) {
            console.error("Cloud synchronization failure:", err);
          }
        }

        setTimeout(() => {
          window.print();
        }, 150);
      };

      const handleResetAll = () => {
        setCustomerName(""); setCustomerCity(""); setDiscountX("0");
        setQty("1"); setProductSearch(""); setSelectedProduct(null); setCode(""); setPrice("");
        setAddedItems([]); setGeneratedItems([]); setIsBillGenerated(false); setEditingBillId(null);
        setIsNewCustomer(false); setPendingDiscountPrompt(false);
      };

      const handleLoadHistoricalBill = (billRecord) => {
        const cleanName = billRecord.customerName === "Walk-In Customer" ? "" : billRecord.customerName;
        setCustomerName(cleanName);
        setCustomerCity(billRecord.customerCity || "");
        setBillDate(billRecord.date);
        setEditingBillId(billRecord.id);
        setDiscountX(String(billRecord.discountRate || 0));
        setIsNewCustomer(false);
        setPendingDiscountPrompt(false);
        
        const loadedItems = (billRecord.items || []).map((item, idx) => ({
          id: idx + Date.now(),
          qty: item.qty, name: item.name, category: item.category || "General",
          code: item.code, basePrice: item.basePrice || item.finalUnitPrice, finalUnitPrice: item.finalUnitPrice,
          totalAmount: item.totalAmount, isOverride: item.isOverride || false, labelType: item.labelType
        }));

        setAddedItems(loadedItems);
        setGeneratedItems(billRecord.items || []);
        setIsBillGenerated(true);
        setCurrentTab("bill");
      };

      // Ascending alphabetical logic grouped by Categories first, then Product Names
      const getSortedProducts = () => {
        return [...cloudProducts].sort((a, b) => {
          const catComp = (a.category || "General").localeCompare(b.category || "General", undefined, { sensitivity: 'base' });
          if (catComp !== 0) return catComp;
          return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
        });
      };

      const filteredProductsForBilling = searchQuery => {
        const sorted = getSortedProducts();
        if (!searchQuery.trim()) return sorted.slice(0, 15);
        return sorted.filter(p => 
          p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          (p.category && p.category.toLowerCase().includes(searchQuery.toLowerCase()))
        ).slice(0, 15);
      };

      // Simple verification without verify button
      const handleTabVerificationInput = (val) => {
        setPasswordInput(val);
        if (val === "b") {
          setIsVerified(true);
        }
      };

      // REPOSITIONED & FIXED: Inside App before return block! (With robust casing normalization)
      const handleProductAddSubmit = async (e) => {
        e.preventDefault();
        const trimmedName = newProdName.trim();
        const categoryVal = newProdCategory.trim() || "General";
        if (!trimmedName) return;

        // Case-insensitive duplicate prevention matching category
        const isDuplicate = cloudProducts.some(p => 
          p.name.trim().toLowerCase() === trimmedName.toLowerCase() && 
          (p.category || "General").trim().toLowerCase() === categoryVal.toLowerCase()
        );
        if (isDuplicate) {
          triggerNotification(`Error: "${trimmedName}" under "${categoryVal}" already exists!`);
          return;
        }

        const payload = { name: trimmedName, category: categoryVal, code: "", price: "" };
        if (window.firebaseBridge && window.firebaseBridge.connected) {
          try {
            await window.firebaseBridge.addProductToCloud(payload);
            setNewProdNameState(""); setNewProdCategory("");
            triggerNotification("Cataloged successfully!");
          } catch (err) {
            console.error(err);
          }
        }
      };

      const handleProductDelete = async (id) => {
        if (window.firebaseBridge && window.firebaseBridge.connected) {
          try {
            await window.firebaseBridge.deleteProductFromCloud(id);
          } catch (err) {
            console.error(err);
          }
        }
      };

      // Append product shortcut to bulk stream area
      const appendProductToBulkStream = (productName) => {
        setBulkInput(prev => {
          const trimmed = prev.trim();
          return trimmed ? `${trimmed} ${productName} ` : `${productName} `;

                                    <span>{p.name}</span>
                                    <span className="text-[8px] bg-stone-100 px-1 rounded text-stone-400">{p.category || "General"}</span>
                                  </div>

                      <div className="grid grid-cols-2 gap-2">

                          <input type="text" id="code-input" placeholder="e.g. 122" value={code} onChange={(e) => handleCodeChange(e.target.value)} className="w-full px-2 py-1 text-xs bg-stone-50 border border-stone-200 rounded font-mono" />

                        <div>
                          <label className="block text-[8px] font-bold text-stone-400 uppercase tracking-wide mb-0.5">Computed Rate (Editable)</label>
                          <input type="number" step="any" placeholder="0.00" value={price} onChange={(e) => setPrice(e.target.value)} className="w-full px-2 py-1 text-xs bg-stone-50 border border-stone-200 rounded font-mono focus:border-stone-500" />
                        </div>
                      </div>

                      <div className="flex justify-center pt-1 border-t border-stone-100">
                        <button type="button" onClick={handleAddItem} className="h-9 w-11 border-2 border-stone-900 hover:bg-stone-100 text-stone-900 rounded-lg flex items-center justify-center shadow-xs transition-all">
                          <i className="fa-solid fa-plus text-xs"></i>
                        </button>
                      </div>
                    </>
                  )}
                </div>

                {/* Staging Interface - Restored List layout with Edit & Delete actions */}
                {addedItems.length > 0 && (
                  <div className="bg-white rounded-xl border border-stone-200 p-2.5 shadow-xs no-print">
                    <h3 className="text-[9px] font-bold uppercase text-stone-400 mb-1.5 tracking-wider">Staged Items Pool</h3>
                    <div className="space-y-1 max-h-48 overflow-y-auto custom-scroll">
                      {addedItems.map((item) => (
                        <div key={item.id} className="flex justify-between items-center text-xs bg-stone-50 p-2 rounded border border-stone-100">
                          <div className="font-semibold text-stone-800 flex-1">
                            {item.qty} × {item.name} {item.code !== "—" && <span className="font-mono text-[9px] text-stone-500">[{item.code}]</span>}
                            {item.isOverride && <span className="text-[8px] text-amber-600 font-bold block">⚠️ Overridden (Bold)</span>}
                          </div>
                          
                          <div className="flex items-center gap-3">
                            <span className="font-mono text-stone-700 font-bold">{item.totalAmount.toFixed(2)}</span>
                            
                            {/* Action block - edit and delete */}
                            <button 
                              onClick={() => {
                                setQty(String(item.qty));
                                setProductSearch(item.name);
                                setCode(item.code === "—" ? "" : item.code);
                                setPrice(String(item.basePrice));
                                setSelectedProduct({ name: item.name, category: item.category });
                                setAddedItems(prev => prev.filter(i => i.id !== item.id));
                              }} 
                              className="text-stone-400 hover:text-stone-700 transition-colors" 
                              title="Edit item parameters"
                            >
                              <i className="fa-solid fa-pen text-[10px]"></i>
                            </button>
                            <button 
                              onClick={() => setAddedItems(prev => prev.filter(i => i.id !== item.id))} 
                              className="text-stone-300 hover:text-rose-600 transition-colors"
                            >
                              <i className="fa-solid fa-trash-can text-[10px]"></i>
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div className="no-print">
                  <button onClick={handleGenerateClick} disabled={addedItems.length === 0} className="w-full py-2.5 bg-stone-900 hover:bg-stone-800 disabled:bg-stone-200 disabled:text-stone-400 text-white font-bold rounded-xl text-xs tracking-wider transition-all shadow-sm">
                    Generate & Save Receipt File
                  </button>
                </div>

                {/* Document Display Preview Framework */}
                <div className="flex flex-col gap-2">
                  <div className="flex items-center justify-between no-print bg-white p-2.5 rounded-xl border border-stone-200 shadow-xs">
                    <span className="text-[9px] font-bold text-stone-400 uppercase tracking-widest">Document Frame Preview</span>
                    <div className="flex items-center gap-1">
                      <button onClick={() => {

                <form onSubmit={handleProductAddSubmit} className="space-y-2 bg-stone-50 p-2.5 rounded-lg border border-stone-200">
                  <input type="text" required placeholder="Product Identification Name..." value={newProdName} onChange={(e) => setNewProdNameState(e.target.value)} className="w-full px-2 py-1 text-xs border bg-white rounded font-semibold" />
                  <input type="text" placeholder="Category Type..." value={newProdCategory} onChange={(e) => setNewProdCategory(e.target.value)} className="w-full px-2 py-1 text-xs border bg-white rounded font-semibold" />
                  <button type="submit" className="w-full py-1.5 bg-stone-900 text-white text-xs font-bold rounded">Commit Entry to Database</button>
                </form>

                {/* Direct Product Merging Option */}
                <div className="bg-stone-50 p-2.5 rounded-lg border border-stone-200 space-y-2">
                  <h3 className="text-[10px] font-bold uppercase text-stone-400">Merge Products</h3>
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="Source (Incorrect)" value={mergeSource} onChange={(e) => setMergeSource(e.target.value)} className="px-2 py-1 text-[10px] border bg-white rounded" />
                    <input type="text" placeholder="Target (Correct)" value={mergeTarget} onChange={(e) => setMergeTarget(e.target.value)} className="px-2 py-1 text-[10px] border bg-white rounded" />
                  </div>
                  <div className="grid grid-cols-1">
                    <button type="button" onClick={handleProductMerge} className="w-full py-1 bg-amber-600 hover:bg-amber-700 text-white text-[10px] font-bold rounded">Perform Merge</button>
                  </div>
                </div>

                <input type="text" placeholder="Filter active local matrix directory..." value={productFilterQuery} onChange={(e) => setProductFilterQuery(e.target.value)} className="w-full px-2 py-1 text-xs bg-stone-50 border border-stone-200 rounded mb-2 font-semibold" />
                
                {/* Lists catalog organized in ascending order of categories first, then product name */}
                <div className="border rounded divide-y max-h-48 overflow-y-auto custom-scroll">
                  {getSortedProducts().filter(p => p.name.toLowerCase().includes(productFilterQuery.toLowerCase())).map(p => (
                    <div key={p.id} className="flex justify-between items-center p-2 text-xs">
                      <div>
                        <span className="font-semibold text-stone-800">{p.name}</span>
                        <span className="text-[8px] bg-stone-100 text-stone-500 px-1 ml-2 rounded">{p.category || "General"}</span>
                      </div>
                      <button onClick={() => handleProductDelete(p.id)} className="text-stone-300 hover:text-rose-600"><i className="fa-solid fa-trash-can text-[10px]"></i></button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {currentTab === "logs" && (
              <div className="bg-white rounded-xl border border-stone-200 shadow-sm p-3.5 space-y-3">
                <div className="mb-2">
                  <h2 className="text-sm font-bold text-stone-900 flex items-center gap-1"><i className="fa-solid fa-history text-stone-500"></i> Protected Historic Index</h2>
                </div>

                {!isVerified ? (
                  <div className="space-y-2">
                    <p className="text-[10px] text-stone-500">Enter access key:</p>
                    {/* Access key verification instantly on type 'b' without submit button */}
                    <input 
                      type="password" 
                      placeholder="Access Code..." 
                      value={passwordInput} 
                      onChange={e => handleTabVerificationInput(e.target.value)}
                      className="w-full px-2.5 py-1.5 text-xs border rounded bg-stone-50 font-mono focus:outline-none"
                    />
                  </div>
                ) : (
                  <div className="space-y-2 max-h-80 overflow-y-auto custom-scroll">
                    <div className="flex justify-between items-center pb-2 border-b">
                      <span className="text-[10px] text-emerald-700 font-bold uppercase"><i className="fa-solid fa-shield-halved"></i> Access Approved</span>
                      <button onClick={() => { setIsVerified(false); setPasswordInput(""); }} className="text-[9px] text-stone-400 underline">Lock Index</button>
                    </div>
                    {cloudBills.map((b) => (
                      <div key={b.id} className="border border-stone-100 rounded p-2.5 hover:bg-stone-50 text-xs space-y-1">
                        <div className="flex justify-between font-semibold">
                          <span>{b.customerName}</span>
                          <span className="font-mono font-bold">{parseFloat(b.totalAmount || 0).toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between text-[9px] text-stone-400">
                          <span>Date Timestamp: {b.date}</span>
                          <button onClick={() => handleLoadHistoricalBill(b)} className="px-2 py-0.5 bg-stone-900 text-white rounded text-[9px]">Load Manifest</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
